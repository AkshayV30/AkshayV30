name: Deploy Vite site to GitHub Pages

# Trigger workflow on push to any branch or manual trigger
on:
  push:
    branches: ["master"] # Adjust to include other branches if needed
  workflow_dispatch: # Allows manual run from Actions tab

# Global environment variables for the workflow
env:
  NODE_VERSION: 20 # Node.js LTS version
  DIST_PATH: ./dist # Build output path

# GitHub token permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Environment for GitHub Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Step 1: Checkout repo and detect branch dynamically
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # Dynamically uses the pushed branch

      # Step 2: Setup Node.js with npm cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Build Vite project
      - name: Build Project
        run: npm run build

      # Step 5: Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 6: Upload built files (artifact) to GitHub Pages
      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DIST_PATH }}

      # Step 7: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
